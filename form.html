<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>修理受付フォーム</title>

<!-- ✅ LIFF SDK（絶対必要） -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial;
  background: #f7f7f7;
  padding: 20px;
}
.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
}
button {
  background: #06c755;
  color: white;
  padding: 12px;
  width: 100%;
  border: none;
  font-size: 16px;
  border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">
<h2>修理受付フォーム</h2>

<form id="form">

<label>お名前</label>
<input type="text" name="name" required>

<label>電話番号</label>
<input type="text" name="phone" required>

<label>メーカー</label>
<input type="text" name="maker">

<label>型番</label>
<input type="text" name="model">

<label>故障内容</label>
<textarea name="issue"></textarea>

<button type="submit">送信する</button>

</form>

<div id="msg"></div>

</div>

<script>
let userId = "";

// ✅ LIFF初期化
window.onload = async function () {
  try {
    await liff.init({ liffId: "2009322369-Om7WRQAU" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    console.log("取得userId:", userId);

  } catch (err) {
    alert("LIFFエラー：" + err);
  }
};

// ✅ 送信処理
document.getElementById("form").onsubmit = async function(e) {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this));

  // ✅ ここが超重要（今回のゴール）
  data.line_user_id = userId;

  console.log("送信データ:", data);

  await fetch("/submit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("msg").innerHTML =
    "<p style='color:green;'>✅ 受付完了しました！</p>";

  this.reset();
};
</script>

</body>
</html>
