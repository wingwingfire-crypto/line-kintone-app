<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>修理受付フォーム</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 700px;
    margin: auto;
}

input,
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button {
    background: #06c755;
    color: white;
    padding: 12px;
    width: 100%;
    border: none;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:disabled {
    background: #aaa;
    cursor: not-allowed;
}

#msg {
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<h2>修理受付フォーム</h2>

<p id="liffStatus" style="color:#555;">LINE連携を確認中です...</p>

<form id="form">

<label>お名前</label>
<input type="text" name="name" required>

<label>電話番号</label>
<input type="text" name="phone" required>

<label>メーカー</label>
<input type="text" name="maker">

<label>型番</label>
<input type="text" name="model">

<label>故障内容</label>
<textarea name="issue"></textarea>

<button id="submitBtn" type="submit" disabled>送信する</button>

</form>

<div id="msg"></div>

</div>

<script>
let userId = "";

// LIFF初期化
window.onload = async function () {
    const submitBtn = document.getElementById("submitBtn");
    const liffStatus = document.getElementById("liffStatus");

    try {
        await liff.init({
            liffId: "2009322369-Om7WRQAU",
            withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;

        console.log("取得LINE User ID:", userId);

        if (userId) {
            liffStatus.innerHTML = "LINE連携完了";
            liffStatus.style.color = "green";
            submitBtn.disabled = false;
        } else {
            liffStatus.innerHTML = "LINEユーザーIDを取得できませんでした";
            liffStatus.style.color = "red";
            submitBtn.disabled = true;
        }

    } catch (err) {
        console.error("LIFF初期化エラー:", err);

        liffStatus.innerHTML = "LIFF初期化エラー：" + err;
        liffStatus.style.color = "red";

        alert("LIFF初期化エラー\n" + err);
        submitBtn.disabled = true;
    }
};


// 送信処理
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    try {
        if (!userId) {
            alert("LINEユーザーIDが取得できていません。LINEアプリから開き直してください。");
            return;
        }

        const data = Object.fromEntries(new FormData(this));

        data.line_user_id = userId;

        console.log("送信データ:", data);

        const response = await fetch("/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.text();

        console.log("サーバ応答:", result);

        if (!response.ok) {
            throw new Error("HTTP " + response.status + " : " + result);
        }

        document.getElementById("msg").innerHTML =
            "<p style='color:green;'>✅ 受付完了しました！</p>";

        this.reset();

    } catch (err) {
        console.error("送信エラー:", err);

        document.getElementById("msg").innerHTML =
            "<p style='color:red;'>❌ エラー：" + err + "</p>";

        alert("送信エラー\n\n" + err);
    }
});
</script>

</body>
</html>
