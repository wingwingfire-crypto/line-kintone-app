<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>修理受付フォーム</title>

.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 700px;
    margin: auto;
}

input,
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button {
    background: #06c755;
    color: white;
    padding: 12px;
    width: 100%;
    border: none;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

#msg {
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<h2>修理受付フォーム</h2>

<form id="form">

<label>お名前</label>
<input type="text" name="name" required>

<label>電話番号</label>
<input type="text" name="phone" required>

<label>メーカー</label>
<input type="text" name="maker">

<label>型番</label>
<input type="text" name="model">

<label>故障内容</label>
<textarea name="issue"></textarea>

<button type="submit">送信する</button>

</form>

<div id="msg"></div>

</div>

<script>

let userId = "";

window.onload = async () => {

    try {

        await liff.init({
            liffId: "2009322369-Om7WRQAU"
        });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        const profile = await liff.getProfile();

        userId = profile.userId;

        console.log("LINE User ID:", userId);

    } catch (err) {

        console.error(err);

        alert("LIFF初期化エラー\n" + err);

    }

};


document.getElementById("form").addEventListener("submit", async (e) => {

    e.preventDefault();

    try {

        const data = Object.fromEntries(
            new FormData(document.getElementById("form"))
        );

        data.line_user_id = userId;

        console.log("送信データ", data);

        const response = await fetch("/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.text();

        console.log("サーバ応答", result);

        if (!response.ok) {
            throw new Error(
                "HTTP " + response.status + " : " + result
            );
        }

        document.getElementById("msg").innerHTML =
            "<p style='color:green;'>✅ 受付完了しました！</p>";

        document.getElementById("form").reset();

    } catch (err) {

        console.error(err);

        document.getElementById("msg").innerHTML =
            "<p style='color:red;'>❌ エラー：" +
            err +
            "</p>";

        alert("送信エラー\n\n" + err);

    }

});

</script>

</body>
</html>
