<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>修理受付フォーム</title>

<!-- ✅ LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial;
  background: #f7f7f7;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
}

button {
  background: #06c755;
  color: white;
  padding: 12px;
  width: 100%;
  border: none;
  font-size: 16px;
  border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">
<h2>修理受付フォーム</h2>

<form id="form">

<label>お名前</label>
<input type="text" name="name" required>

<label>電話番号</label>
<input type="text" name="phone" required>

<label>メーカー</label>
<input type="text" name="maker">

<label>型番</label>
<input type="text" name="model">

<label>故障内容</label>
<textarea name="issue"></textarea>

<button type="submit">送信する</button>

</form>

<div id="msg"></div>

</div>

<!-- ✅ LIFF + 送信処理 -->
<script>
let userId = "";

window.onload = async function () {
  try {
    // ✅ ここにLIFF ID入れる！！！！
    await liff.init({ liffId: "2009322369-Om7WRQAU" });

    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      const profile = await liff.getProfile();
      userId = profile.userId;
      console.log("LINE userId:", userId);
    }
  } catch (err) {
    console.error("LIFFエラー:", err);
  }
};

document.getElementById("form").onsubmit = async function(e) {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this));

  // ✅ LINEユーザーID追加
  data.line_user_id = userId;

  try {
    await fetch("/submit", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    document.getElementById("msg").innerHTML =
      "<p style='color:green;'>✅ 受付完了しました！担当よりご連絡します。</p>";

    document.getElementById("form").reset();

  } catch (err) {
    document.getElementById("msg").innerHTML =
      "<p style='color:red;'>❌ 送信に失敗しました</p>";
  }
};
</script>

</body>
</html>
